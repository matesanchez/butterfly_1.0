name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Init project
        run: python scripts/init_project.py
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest tests -v --tb=short
      - name: Dry run
        run: python scripts/run_pipeline.py --dry-run --limit 5
